<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoLaço - Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --verde-escuro: #025940;
            --verde-medio: #04D939;
            --verde-claro: #03A63C;
            --verde-muito-claro: #9AEBA3;
            --branco: #FFFFFF;
            --cinza-claro: #F5F5F5;
            --sombra: rgba(0, 0, 0, 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--verde-escuro);
            color: var(--branco);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .menu-container {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .menu-header {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .menu-section {
            margin-bottom: 2rem;
        }
        
        .section-title {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .section-icon {
            margin-right: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 30px;
            height: 30px;
        }
        
        .leaf-icon {
            color: var(--verde-muito-claro);
        }
        
        .plus-icon {
            background-color: var(--verde-muito-claro);
            color: var(--verde-escuro);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .menu-button {
            background-color: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: var(--branco);
            padding: 12px 15px;
            margin-bottom: 10px;
            width: 100%;
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }
        
        .menu-button:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .menu-button i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        
        .menu-footer {
            display: flex;
            justify-content: flex-start;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .footer-icon {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--branco);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .footer-icon:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        @media (max-width: 480px) {
            .menu-container {
                padding: 1.5rem;
            }
            
            .logo {
                font-size: 1.5rem;
            }
            
            .menu-button {
                padding: 10px 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <div class="menu-header">
            <div class="logo">EcoLaço</div>
        </div>
        
        <div class="menu-section">
            <div class="section-title">
                <div class="section-icon leaf-icon">
                    <i class="fas fa-leaf"></i>
                </div>
                <span>FUNCIONALIDADES</span>
            </div>
            
            <button class="menu-button">
                <i class="far fa-clock"></i>Horários de funcionamento dos pontos de coleta
            </button>
            
            <button class="menu-button">
                <i class="fas fa-map-marker-alt"></i>Localização por material
            </button>
            
            <button class="menu-button">
                <i class="fas fa-video"></i>Vídeos curtos com dicas sustentáveis
            </button>
            
            <button class="menu-button">
                <i class="fas fa-users"></i>Acesso Público
            </button>
            
            <button class="menu-button">
                <i class="fas fa-chart-bar"></i>Comparativo entre bairros
            </button>
            
            <button class="menu-button">
                <i class="fas fa-lock"></i>Acesso Privado - Prefeitura
            </button>
        </div>
        
        <div class="menu-section">
            <div class="section-title">
                <div class="section-icon plus-icon">
                    <i class="fas fa-plus"></i>
                </div>
                <span>EXTRAS</span>
            </div>
            
            <button class="menu-button">
                <i class="fas fa-gamepad"></i>Quiz ecológico e jogos
            </button>
            
            <button class="menu-button">
                <i class="fas fa-trophy"></i>Sistema de gamificação
            </button>
            
            <button class="menu-button">
                <i class="fas fa-lightbulb"></i>Seção de "Sabia que..."
            </button>
            
            <button class="menu-button">
                <i class="fas fa-robot"></i>Chatbot para dúvidas sobre reciclagem
            </button>
            
            <button class="menu-button">
                <i class="fas fa-star"></i>Nos dê sua avaliação como utilizador!
            </button>
        </div>
        
        <div class="menu-footer">
            <div class="footer-icon">
                <i class="fas fa-info"></i>
            </div>
            <div class="footer-icon">
                <i class="fas fa-bell"></i>
            </div>
            <div class="footer-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
        </div>
    </div>
</body>
</html>
